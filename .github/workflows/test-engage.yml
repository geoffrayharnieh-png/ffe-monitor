name: TEST Engagement

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run test engagement
        env:
          NTFY_TOPIC:   ${{ secrets.NTFY_TOPIC }}
          FFE_USERNAME: ${{ secrets.FFE_USERNAME }}
          FFE_PASSWORD: ${{ secrets.FFE_PASSWORD }}
        run: python test_engage.py
